<!DOCTYPE html>
<html>
<head>
<title>BMI Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>BMI Calculator</h2>

<input id="weight" placeholder="Weight kg">
<input id="height" placeholder="Height meters">

<br><br>

<button onclick="bmi()">Calculate</button>

<h3 id="result"></h3>

<script>

function bmi(){
let w=weight.value
let h=height.value
let b=w/(h*h)

result.innerHTML="BMI = "+b.toFixed(2)
}

</script>

</body>
</html>
