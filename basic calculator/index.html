<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="stars"></div>
<h1>✨ Calculator Hub</h1>

<button class="toggle-btn" onclick="toggleTheme()">🌙 Toggle Theme</button>

<div class="container">
<a href="bmi.html"><button>BMI</button></a>
<a href="percentage.html"><button>Percentage</button></a>
<a href="temperature.html"><button>Temperature</button></a>
<a href="length.html"><button>Length</button></a>
<a href="weight.html"><button>Weight</button></a>
<a href="time.html"><button>Time</button></a>
</div>

<div class="calculator">

<input type="text" id="display" disabled>

<div class="buttons">
<button onclick="clearDisplay()">C</button>
<button onclick="deleteLast()">DEL</button>
<button onclick="appendValue('/')">/</button>
<button onclick="appendValue('*')">*</button>

<button onclick="appendValue('7')">7</button>
<button onclick="appendValue('8')">8</button>
<button onclick="appendValue('9')">9</button>
<button onclick="appendValue('-')">-</button>

<button onclick="appendValue('4')">4</button>
<button onclick="appendValue('5')">5</button>
<button onclick="appendValue('6')">6</button>
<button onclick="appendValue('+')">+</button>

<button onclick="appendValue('1')">1</button>
<button onclick="appendValue('2')">2</button>
<button onclick="appendValue('3')">3</button>
<button onclick="calculate()">=</button>

<button onclick="appendValue('0')" class="zero">0</button>
<button onclick="appendValue('.')">.</button>
</div>

</div>

<div class="history">
<h3>📜 History</h3>
<ul id="historyList"></ul>
</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
