<!DOCTYPE html>
<html>
<head>
<title>Temperature Converter</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Celsius to Fahrenheit</h2>

<input id="temp" placeholder="Celsius">

<br><br>

<button onclick="convert()">Convert</button>

<h3 id="result"></h3>

<script>

function convert(){

let c=temp.value
let f=(c*9/5)+32

result.innerHTML="Fahrenheit = "+f

}

</script>

</body>
</html>
