<!DOCTYPE html>
<html>
<head>
<title>Time Converter</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Minutes to Hours</h2>

<input id="min" placeholder="Minutes">

<br><br>

<button onclick="convert()">Convert</button>

<h3 id="result"></h3>

<script>

function convert(){

let m=min.value
let h=m/60

result.innerHTML="Hours = "+h

}

</script>

</body>
</html>
