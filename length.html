<!DOCTYPE html>
<html>
<head>
<title>Length Converter</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Meters to Kilometers</h2>

<input id="meter" placeholder="Meters">

<br><br>

<button onclick="convert()">Convert</button>

<h3 id="result"></h3>

<script>

function convert(){

let m=meter.value
let km=m/1000

result.innerHTML="Kilometers = "+km

}

</script>

</body>
</html>
